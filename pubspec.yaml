name: aam_chini
description: "AI-powered Bangladeshi Mango Variety Classifier for Edge Devices."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  # Switch to the modern version that supports Dart 3.x
  tflite_flutter: ^0.12.1
  image: ^4.3.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7

# --- CRITICAL FIX FOR YOUR ERROR ---
# This forces the app to use a compatible version of typed_data
# which fixes the 'UnmodifiableUint8ListView' build error in 0.10.4
#dependency_overrides:
#  typed_data: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mango_model_v3.tflite
    - assets/labels.txt